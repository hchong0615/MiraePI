<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingView Portfolio Widget</title>
    <style>
        /* This ensures the widget fills the Notion embed block without borders */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #0F0F0F; /* Matches your widget background */
            overflow: hidden;
        }
        .tradingview-widget-container {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>
    <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js" async>
        {
            "colorTheme": "dark",
            "locale": "en",
            "largeChartUrl": "",
            "isTransparent": false,
            "showSymbolLogo": true,
            "backgroundColor": "#0F0F0F",
            "width": "100%",
            "height": "100%",
            "symbolsGroups": [
                {
                    "name": "PI",
                    "symbols": [
                        {"name": "ASX:GHLD"},
                        {"name": "KRX:0072R0", "displayName": "TIGER KRX금현물"},
                        {"name": "KRX:371160", "displayName": "TIGER 차이나항셍테크"}
                    ]
                },
                {
                    "name": "원자재",
                    "symbols": [
                        {"name": "FX_IDC:XAUUSD", "displayName": "Gold Spot (ICE)"}
                    ]
                },
                {
                    "name": "PI Watchlist",
                    "symbols": [
                        {"name": "AMEX:GLD"},
                        {"name": "AMEX:COPX"},
                        {"name": "AMEX:URA"},
                        {"name": "NASDAQ:DTCR"},
                        {"name": "NASDAQ:ZAP"},
                        {"name": "AMEX:MLPA"},
                        {"name": "AMEX:MLPX"}
                    ]
                },
                {
                    "name": "FX",
                    "symbols": [
                        {"name": "FX_IDC:USDKRW"},
                        {"name": "FX_IDC:AUDKRW"},
                        {"name": "FX_IDC:BRLKRW"},
                        {"name": "FX_IDC:JPYKRW"}
                    ]
                }
            ]
        }
        </script>
    </div>
    </body>
</html>
